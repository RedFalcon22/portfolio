<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe0c8"/>
      <stop offset="100%" stop-color="#f5c9a8"/>
    </linearGradient>
    <linearGradient id="skinDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5c9a8"/>
      <stop offset="100%" stop-color="#e8b48e"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b3a1f"/>
      <stop offset="100%" stop-color="#4a2510"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#5e58fb"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="50%" stop-color="#162038"/>
      <stop offset="100%" stop-color="#0d1527"/>
    </linearGradient>
    <linearGradient id="collarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#dde4f5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.1" fill="#00d4ff">
    <circle cx="18" cy="18" r="1.2"/><circle cx="36" cy="18" r="1.2"/>
    <circle cx="18" cy="36" r="1.2"/><circle cx="36" cy="36" r="1.2"/>
    <circle cx="164" cy="164" r="1.2"/><circle cx="182" cy="164" r="1.2"/>
    <circle cx="164" cy="182" r="1.2"/><circle cx="182" cy="182" r="1.2"/>
  </g>

  <!-- Circuit lines -->
  <g opacity="0.22" stroke="#00d4ff" stroke-width="1" fill="none">
    <polyline points="8,58 22,58 22,44 32,44"/>
    <circle cx="32" cy="44" r="2.5" fill="#00d4ff" stroke="none"/>
    <polyline points="192,142 178,142 178,156 168,156"/>
    <circle cx="168" cy="156" r="2.5" fill="#5e58fb" stroke="none"/>
  </g>

  <!-- Main jacket body -->
  <path d="M 30 200 Q 32 155 58 143 L 80 160 L 100 152 L 120 160 L 142 143 Q 168 155 170 200 Z"
        fill="url(#shirtGrad)" filter="url(#softShadow)"/>

  <!-- Left lapel -->
  <path d="M 80 160 L 95 180 L 95 200 L 60 200 Q 45 175 50 158 Z"
        fill="#1a2440"/>
  <!-- Right lapel -->
  <path d="M 120 160 L 105 180 L 105 200 L 140 200 Q 155 175 150 158 Z"
        fill="#1a2440"/>

  <!-- White shirt / collar showing between lapels -->
  <path d="M 80 160 L 100 152 L 120 160 L 105 180 L 100 185 L 95 180 Z"
        fill="url(#collarGrad)"/>

  <!-- Tie (cyan gradient, elegant) -->
  <path d="M 97 162 L 100 158 L 103 162 L 101 185 L 100 188 L 99 185 Z"
        fill="url(#accentGrad)" opacity="0.9"/>
  <!-- Tie knot highlight -->
  <ellipse cx="100" cy="163" rx="3.5" ry="2.5" fill="#00d4ff" opacity="0.7"/>

  <!-- Suit lapel notch line (left) -->
  <path d="M 72 150 L 95 178" stroke="#0d1527" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Suit lapel notch line (right) -->
  <path d="M 128 150 L 105 178" stroke="#0d1527" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Jacket button -->
  <circle cx="100" cy="192" r="3" fill="#1a2440" stroke="#00d4ff" stroke-width="0.8" opacity="0.8"/>

  <!-- Neck -->
  <rect x="88" y="126" width="24" height="28" rx="6" fill="url(#skinGrad)"/>

  <!-- Head -->
  <ellipse cx="100" cy="92" rx="46" ry="50" fill="url(#skinGrad)" filter="url(#softShadow)"/>

  <!-- Hair base cap -->
  <path d="M 54 82 Q 54 41 100 40 Q 146 41 146 82 L 143 70 Q 130 48 100 48 Q 70 48 57 70 Z"
        fill="url(#hairGrad)"/>
  <!-- Hair sides (fade into ears) -->
  <ellipse cx="55" cy="80" rx="9" ry="15" fill="#5a2e12"/>
  <ellipse cx="145" cy="80" rx="9" ry="15" fill="#5a2e12"/>
  <!-- Hair top fill for volume -->
  <ellipse cx="100" cy="52" rx="38" ry="15" fill="url(#hairGrad)"/>
  <!-- Slight hair highlight/sheen -->
  <ellipse cx="92" cy="48" rx="18" ry="7" fill="#8c5030" opacity="0.35"/>

  <!-- Ears -->
  <ellipse cx="54" cy="95" rx="9" ry="12" fill="url(#skinDark)"/>
  <ellipse cx="146" cy="95" rx="9" ry="12" fill="url(#skinDark)"/>
  <ellipse cx="54" cy="95" rx="5.5" ry="8" fill="#e8b48e"/>
  <ellipse cx="146" cy="95" rx="5.5" ry="8" fill="#e8b48e"/>

  <!-- Eyebrows (brown, neat) -->
  <path d="M 73 74 Q 83 69 93 73" stroke="#5a2e12" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 107 73 Q 117 69 127 74" stroke="#5a2e12" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eye whites -->
  <ellipse cx="83" cy="88" rx="10" ry="11" fill="white"/>
  <ellipse cx="117" cy="88" rx="10" ry="11" fill="white"/>
  <!-- Iris (hazel/brown) -->
  <circle cx="83" cy="89" r="6.8" fill="#5a3210"/>
  <circle cx="117" cy="89" r="6.8" fill="#5a3210"/>
  <!-- Cyan tech ring -->
  <circle cx="83" cy="89" r="6.8" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.55" filter="url(#glow)"/>
  <circle cx="117" cy="89" r="6.8" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.55" filter="url(#glow)"/>
  <!-- Pupils -->
  <circle cx="84" cy="89" r="3.5" fill="#1a0800"/>
  <circle cx="118" cy="89" r="3.5" fill="#1a0800"/>
  <!-- Highlights -->
  <circle cx="85.5" cy="86.5" r="2" fill="white" opacity="0.95"/>
  <circle cx="119.5" cy="86.5" r="2" fill="white" opacity="0.95"/>
  <!-- Eyelid lines -->
  <path d="M 73 84 Q 83 78 93 84" stroke="#c09070" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 107 84 Q 117 78 127 84" stroke="#c09070" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Nose -->
  <path d="M 100 98 Q 95 111 97 116 Q 100 118 103 116 Q 105 111 100 98"
        fill="#e0a880" opacity="0.55"/>
  <circle cx="97" cy="115" r="2" fill="#d09070" opacity="0.4"/>
  <circle cx="103" cy="115" r="2" fill="#d09070" opacity="0.4"/>

  <!-- Smile -->
  <path d="M 87 124 Q 100 135 113 124" stroke="#c08060" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 89 124 Q 100 132 111 124 Q 100 130 89 124 Z" fill="white" opacity="0.75"/>
  <path d="M 90 126 Q 100 130 110 126" stroke="#e0a880" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Cyan circuit dot, left temple -->
  <circle cx="60" cy="72" r="3.5" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <line x1="63" y1="72" x2="72" y2="72" stroke="#00d4ff" stroke-width="1.2" opacity="0.45"/>
  <line x1="60" y1="68.5" x2="60" y2="62" stroke="#00d4ff" stroke-width="1.2" opacity="0.45"/>

  <!-- Purple dot, right temple -->
  <circle cx="140" cy="72" r="3.5" fill="#5e58fb" opacity="0.8" filter="url(#glow)"/>
  <line x1="137" y1="72" x2="128" y2="72" stroke="#5e58fb" stroke-width="1.2" opacity="0.45"/>

  <!-- Pocket square -->
  <path d="M 67 158 L 75 155 L 78 161 L 70 164 Z" fill="#00d4ff" opacity="0.75"/>
  <line x1="71" y1="156" x2="71" y2="163" stroke="#0099cc" stroke-width="0.8" opacity="0.5"/>

  <!-- Code tag watermark -->
  <text x="9" y="193" font-family="monospace" font-size="12" fill="#00d4ff" opacity="0.4">&lt;/KK&gt;</text>
</svg>
